<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysiCode Lab - 物理求解器演示（可交互）</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #f0f0f0; }
        canvas { border: 2px solid #333; background: white; display: block; margin: 10px auto; box-shadow: 2px 2px 8px rgba(0,0,0,0.2); }
        .controls, .settings { text-align: center; margin: 10px; }
        button { margin: 0 8px; padding: 6px 12px; font-size: 14px; cursor: pointer; }
        .settings input { width: 60px; margin: 0 5px; }
        pre { background: #eee; padding: 10px; overflow: auto; max-height: 200px; width: 800px; margin: 10px auto; font-size: 12px; }
        h1, h3 { text-align: center; }
        .settings { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 10px; width: fit-content; margin: 10px auto; }
    </style>
</head>
<body>
    <h1>PhysiCode Solver WebAssembly 演示</h1>
    <div class="controls">
        <button id="stepBtn">单步仿真 (dt=0.02)</button>
        <button id="startBtn">开始动画</button>
        <button id="stopBtn">停止</button>
        <button id="exportBtn">导出数据 (CSV)</button>
    </div>
    <div class="settings">
        <h3>添加新粒子</h3>
        <label>X: <input type="number" id="px" value="0" step="0.5"></label>
        <label>Y: <input type="number" id="py" value="5" step="0.5"></label>
        <label>质量: <input type="number" id="pmass" value="1.0" step="0.1" min="0.1"></label>
        <label>半径: <input type="number" id="prad" value="0.3" step="0.05" min="0.05"></label>
        <button id="addParticleBtn">➕ 添加粒子</button>
        <button id="resetWorldBtn">🔄 重置世界（清空所有粒子）</button>
    </div>
    <canvas id="canvas" width="800" height="500"></canvas>
    <h3>控制台输出</h3>
    <pre id="log"></pre>

    <script src="PhysiCodeSolver_WASM.js"></script>
    <script>
        let moduleInstance = null;
        let worldPtr = null;
        let animationId = null;
        let running = false;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 坐标变换：物理世界 Y 轴向上，Canvas Y 轴向下
        function worldToCanvas(x, y) {
            const cx = x + canvas.width/2;
            const cy = canvas.height - (y + 100); // 偏移地面显示
            return { x: cx, y: cy };
        }

        // 绘制所有粒子
        function drawScene() {
            if (!worldPtr) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制地面示意线（y = 0 平面）
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 100);
            ctx.lineTo(canvas.width, canvas.height - 100);
            ctx.strokeStyle = '#888';
            ctx.stroke();

            // 获取粒子数据
            const particlesData = worldPtr.getParticlesData();
            // particlesData 是 [x1,y1,z1,r1, x2,y2,z2,r2, ...]
            for (let i = 0; i < particlesData.length; i += 4) {
                const px = particlesData[i];
                const py = particlesData[i+1];
                const radius = particlesData[i+3];
                const { x: cx, y: cy } = worldToCanvas(px, py);
                ctx.beginPath();
                ctx.arc(cx, cy, radius * 20, 0, 2 * Math.PI);
                ctx.fillStyle = '#3399ff';
                ctx.fill();
                ctx.strokeStyle = '#003366';
                ctx.stroke();
            }
        }

        function log(msg) {
            const pre = document.getElementById('log');
            pre.textContent += msg + '\n';
            pre.scrollTop = pre.scrollHeight;
            console.log(msg);
        }

        // 初始化世界（重力 + 地面）
        function initWorld() {
            if (!moduleInstance) throw new Error("模块未加载");
            const world = new moduleInstance.World();
            const gravity = new moduleInstance.Vec3(0, -9.8, 0);
            world.setGravity(gravity);
            const normal = new moduleInstance.Vec3(0, 1, 0);
            world.addPlane(normal, 0.0);
            return world;
        }

        // 重置世界：删除旧世界，新建一个，并可选添加默认粒子
        function resetWorld(addDefaultParticles = true) {
            if (worldPtr) {
                worldPtr.delete();  // 释放 C++ 对象
            }
            worldPtr = initWorld();
            if (addDefaultParticles) {
                // 添加三个默认粒子，与初始演示一致
                worldPtr.addParticle(0, 5, 0, 1.0, 0.3);
                worldPtr.addParticle(-2, 4, 0, 1.0, 0.25);
                worldPtr.addParticle(2, 6, 0, 1.0, 0.2);
                log("重置世界，添加了三个默认粒子");
            } else {
                log("世界已重置，无粒子");
            }
            drawScene();
        }

        async function init() {
            log("正在加载 WASM 模块...");
            const ModuleFactory = window.PhysiCodeSolverModule;
            moduleInstance = await ModuleFactory();
            log("WASM 模块加载完成");

            resetWorld(true);  // 创建世界并添加默认粒子
            log("World 对象创建成功，设置重力 (0, -9.8, 0)，添加地面平面 (y=0)");
        }

        // 添加粒子（从 UI 读取参数）
        function addParticleFromUI() {
            if (!worldPtr) {
                log("错误：世界未初始化");
                return;
            }
            const x = parseFloat(document.getElementById('px').value);
            const y = parseFloat(document.getElementById('py').value);
            const mass = parseFloat(document.getElementById('pmass').value);
            const radius = parseFloat(document.getElementById('prad').value);
            if (isNaN(x) || isNaN(y) || isNaN(mass) || isNaN(radius) || mass <= 0 || radius <= 0) {
                log("参数无效，请检查输入（质量、半径需为正数）");
                return;
            }
            worldPtr.addParticle(x, y, 0, mass, radius);
            log(`添加粒子 at (${x}, ${y}), 质量=${mass}, 半径=${radius}`);
            drawScene();  // 立即刷新显示
        }

        function step(dt = 0.02) {
            if (!worldPtr) return;
            worldPtr.step(dt);
            drawScene();
            log(`step dt=${dt}`);
        }

        function exportData() {
            if (!worldPtr) return;
            const csvStr = worldPtr.exportData();
            const blob = new Blob([csvStr], { type: "text/csv" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `physics_export_${Date.now()}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            log("数据已导出为 CSV 文件");
        }

        function animate() {
            if (!running) return;
            step(0.02);
            requestAnimationFrame(animate);
        }

        // 绑定 UI 事件
        document.getElementById('stepBtn').onclick = () => step(0.02);
        document.getElementById('startBtn').onclick = () => {
            if (running) return;
            running = true;
            animate();
            log("开始连续仿真");
        };
        document.getElementById('stopBtn').onclick = () => {
            running = false;
            if (animationId) cancelAnimationFrame(animationId);
            log("停止仿真");
        };
        document.getElementById('exportBtn').onclick = exportData;
        document.getElementById('addParticleBtn').onclick = addParticleFromUI;
        document.getElementById('resetWorldBtn').onclick = () => resetWorld(true);

        init().catch(err => log("初始化失败: " + err));
    </script>
</body>
</html>
